<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鼎顓電子 - 員工出勤管理系統</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --sidebar-bg: #1e293b; --main-bg: #f1f5f9; --primary: #3b82f6;
            --accent: #10b981; --danger: #ef4444; --warning: #f59e0b; --text-main: #1e293b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        body { margin: 0; font-family: 'Inter', "Microsoft JhengHei", sans-serif; background: var(--main-bg); color: var(--text-main); display: flex; min-height: 100vh; overflow: hidden; }
        .lang-switcher { position: fixed; top: 15px; right: 20px; z-index: 1000; display: flex; gap: 8px; }
        .btn-lang { background: white; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar h1 { font-size: 22px; margin-bottom: 40px; border-left: 5px solid var(--primary); padding-left: 15px; }
        .nav-item { padding: 14px 18px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 12px; color: #94a3b8; font-weight: 500; }
        .nav-item.active { background: var(--primary); color: white; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        .page-content { display: none; max-width: 1000px; margin: 0 auto; }
        .page-content.active { display: block; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: var(--card-shadow); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; justify-content: center; }
        .btn-excel { background: #16a34a; color: white; }
        .btn-page { padding: 8px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; }
        .btn-page:disabled { opacity: 0.5; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .pagination-ctrl { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="btn-lang" onclick="changeLanguage('zh')">繁體中文</button>
        <button class="btn-lang" onclick="changeLanguage('vi')">Tiếng Việt</button>
    </div>

    <div class="sidebar">
        <h1 data-vi="CÔNG TY ĐỈNH CHUYÊN">鼎顓電子股份有限公司</h1>
        <div id="nav-dashboard" class="nav-item active" onclick="switchPage('dashboard')" data-vi="📝 Đơn xin nghỉ phép">📝 請假申請</div>
        <div id="nav-personal" class="nav-item" onclick="switchPage('personal')" data-vi="🔍 Tra cứu cá nhân">🔍 個人紀錄查詢</div>
        <div id="nav-search" class="nav-item" onclick="switchPage('search')" data-vi="📅 Danh sách duyệt">📅 月度核准清單</div>
    </div>

    <div class="main-content">
        <div id="page-dashboard" class="page-content active">
            <h2 data-vi="📝 Đơn xin nghỉ phép">📝 請假申請</h2>
            <div class="card">
                <div class="form-grid">
                    <div><label data-vi="Bộ phận">所屬部門</label>
                        <select id="dept"><option>管理部</option><option>製造部</option><option>SMT</option><option>資材部</option><option>業務部</option><option>DIP</option><option>品保部</option></select>
                    </div>
                    <div><label data-vi="Mã số nhân viên">人員工號</label><input type="text" id="empId" placeholder="D220008"></div>
                </div>
                <div class="form-grid">
                    <div><label data-vi="Họ và tên">員工姓名</label><input type="text" id="empName"></div>
                    <div><label data-vi="Loại phép">請假類別</label>
                        <select id="leaveType"><option>事假</option><option>病假</option><option>特休</option><option>公假</option><option>產假</option><option>陪產假</option><option>補休</option><option>婚假</option><option>生理假</option></select>
                    </div>
                </div>
                <div class="form-grid">
                    <div><label data-vi="Thời gian bắt đầu">起始時間</label><input type="date" id="startDate" onchange="autoCalc()"><input type="time" id="startTime" value="08:30" onchange="autoCalc()"></div>
                    <div><label data-vi="Thời gian kết thúc">結束時間</label><input type="date" id="endDate" onchange="autoCalc()"><input type="time" id="endTime" value="17:30" onchange="autoCalc()"></div>
                </div>
                <div id="durationText" style="padding: 15px; background: #eff6ff; border-radius: 10px; margin: 20px 0; text-align: center;" data-vi="Vui lòng chọn thời gian">請選擇時間以計算時數</div>
                <button id="submitBtn" class="btn btn-primary" onclick="saveToCloud()" data-vi="Xác nhận gửi đơn">確認送出申請</button>
            </div>
        </div>

        <div id="page-personal" class="page-content">
            <h2 data-vi="🔍 Tra cứu cá nhân">🔍 個人紀錄查詢</h2>
            <div class="card">
                <input type="text" id="queryEmpId" placeholder="D220008" style="margin-bottom: 10px;">
                <button class="btn btn-primary" onclick="searchPersonalRecords()" data-vi="Bắt đầu tra cứu">開始查詢</button>
            </div>
        </div>

        <div id="page-search" class="page-content">
            <h2 data-vi="📅 Danh sách duyệt tháng">📅 月度核准清單</h2>
            <div class="card" style="padding:0; overflow-x:auto;">
                <table>
                    <thead>
                        <tr><th data-vi="Bộ phận">部門</th><th data-vi="Mã số">工號</th><th data-vi="Họ tên">姓名</th><th data-vi="Loại phép">假別</th><th data-vi="Ngày">日期</th><th data-vi="Số giờ">時數</th><th data-vi="Trạng thái">狀態</th></tr>
                    </thead>
                    <tbody id="allTableBody"></tbody>
                </table>
                <div class="pagination-ctrl">
                    <button id="prevBtn" class="btn-page" onclick="changePage(-1)" data-vi="Trang trước">上一頁</button>
                    <span id="pageInfo" style="font-size: 14px; color: #64748b;">第 1 頁 / 共 1 頁</span>
                    <button id="nextBtn" class="btn-page" onclick="changePage(1)" data-vi="Trang sau">下一頁</button>
                </div>
            </div>
            <div style="margin-top:20px; display:flex; gap:10px; align-items:center;">
                <input type="month" id="exportMonth" style="width:200px;">
                <button class="btn btn-excel" onclick="exportMonthExcel()">導出 EXCEL (Export)</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzRmuyxGJSip4k2VANAuUtuJLf25Ft9Pc",
        authDomain: "company-attendance-syste-e3503.firebaseapp.com",
        projectId: "company-attendance-syste-e3503",
        storageBucket: "company-attendance-syste-e3503.firebasestorage.app",
        messagingSenderId: "1092562606409",
        appId: "1:1092562606409:web:24843bace8a4e1e2616298",
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 分頁變數 ---
    let allRecords = [];
    let currentPage = 1;
    const rowsPerPage = 10;

    window.changeLanguage = (lang) => {
        document.querySelectorAll('[data-vi]').forEach(el => {
            if (!el.dataset.zh) el.dataset.zh = el.innerText;
            el.innerText = (lang === 'vi') ? el.dataset.vi : el.dataset.zh;
        });
    };

    window.exportMonthExcel = async () => {
        const month = document.getElementById('exportMonth').value;
        if (!month) return alert("請選擇月份！");
        try {
            const snap = await getDocs(collection(db, "formEntries"));
            const data = snap.docs.map(d => d.data()).filter(item => item.sDate && item.sDate.startsWith(month));
            if (data.length === 0) return alert("無資料！");
            const wsData = [["部門", "工號", "姓名", "假別", "日期", "時數", "狀態"]];
            data.forEach(r => wsData.push([r.dept, r.id, r.name, r.leaveType, r.sDate, r.duration, r.status]));
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, `Attendence_${month}.xlsx`);
        } catch (e) { alert(e.message); }
    };

    window.switchPage = (id) => {
        document.querySelectorAll('.page-content, .nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
        if(id === 'search') {
            currentPage = 1; // 重置為第一頁
            loadAllData();
        }
    };

    window.searchPersonalRecords = () => {
        const qId = document.getElementById('queryEmpId').value.trim();
        if(!qId) return alert("請輸入工號！");
        sessionStorage.setItem('targetFilterId', qId);
        switchPage('search');
    };

    // --- 核心：分頁載入邏輯 ---
    window.loadAllData = async () => {
        const tbody = document.getElementById('allTableBody');
        tbody.innerHTML = "<tr><td colspan='7'>Loading...</td></tr>";
        const filterId = sessionStorage.getItem('targetFilterId');

        try {
            // 從 Firebase 抓取所有資料
            const snap = await getDocs(query(collection(db, "formEntries"), orderBy("createdAt", "desc")));
            allRecords = snap.docs.map(d => d.data());

            // 如果有工號篩選
            if(filterId) {
                allRecords = allRecords.filter(r => r.id === filterId);
            }

            renderTable();
        } catch (e) { tbody.innerHTML = "<tr><td colspan='7'>Error loading data.</td></tr>"; }
    };

    // 渲染表格內容
    function renderTable() {
        const tbody = document.getElementById('allTableBody');
        const totalPages = Math.ceil(allRecords.length / rowsPerPage) || 1;

        // 計算目前頁面要顯示的區間
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageData = allRecords.slice(start, end);

        if (pageData.length === 0) {
            tbody.innerHTML = "<tr><td colspan='7' style='text-align:center'>查無資料</td></tr>";
        } else {
            tbody.innerHTML = pageData.map(r => `
                <tr>
                    <td>${r.dept}</td><td>${r.id}</td><td>${r.name}</td>
                    <td>${r.leaveType}</td><td>${r.sDate}</td>
                    <td>${r.duration}</td><td>${r.status}</td>
                </tr>`).join('');
        }

        // 更新分頁資訊
        document.getElementById('pageInfo').innerText = `第 ${currentPage} 頁 / 共 ${totalPages} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === totalPages);
    }

    // 切換分頁按鈕
    window.changePage = (dir) => {
        currentPage += dir;
        renderTable();
        // 畫面自動捲動回表格頂部，方便查看
        document.querySelector('.main-content').scrollTop = 0;
    };

    window.autoCalc = () => { /* ...計算邏輯... */ };
    window.saveToCloud = async () => { /* ...儲存邏輯... */ alert("已送出"); location.reload(); };

    window.addEventListener('DOMContentLoaded', () => switchPage('dashboard'));
</script>
</body>
</html>
