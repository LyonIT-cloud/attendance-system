<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鼎顓電子 - 員工出勤管理系統</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            /* 側邊欄改為圖中的深藍紫色調 */
            --sidebar-bg: #1a1c2e; 
            --sidebar-active: #3b82f6;
            --main-bg: #fdf6f0; /* 暖米色背景，搭配插畫 */
            --primary: #3b82f6;
            --accent: #10b981; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --text-main: #2c3e50;
            --card-radius: 20px;
            --input-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body { 
            margin: 0; 
            font-family: 'Inter', "Microsoft JhengHei", sans-serif; 
            background: var(--main-bg); 
            /* 模擬參考圖中的插畫背景 */
            background-image: linear-gradient(rgba(253, 246, 240, 0.8), rgba(253, 246, 240, 0.8)), 
                              url('https://img.freepik.com/free-vector/hand-drawn-business-planning-concept_52683-76248.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main); 
            display: flex; 
            min-height: 100vh; 
        }

        /* 側邊欄優化 */
        .sidebar { 
            width: 260px; 
            background: var(--sidebar-bg); 
            color: white; 
            padding: 30px 15px; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }
        .sidebar h1 { 
            font-size: 22px; 
            margin-bottom: 40px; 
            text-align: center;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-item { 
            padding: 16px 20px; 
            margin-bottom: 8px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: #94a3b8; 
            font-weight: 500; 
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { 
            background: var(--sidebar-active); 
            color: white; 
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); 
        }
        .nav-admin { border: 1px dashed #475569; margin-top: 15px; color: #fbbf24; }

        /* 主內容區優化 */
        .main-content { flex: 1; padding: 40px; box-sizing: border-box; }
        .page-content { display: none; max-width: 900px; margin: 0 auto; }
        .page-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        
        h2 { font-weight: 800; margin-bottom: 25px; color: #1e293b; font-size: 24px; }

        /* 卡片設計 - 圓角與玻璃質感 */
        .card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: var(--card-radius); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
            border: 1px solid white; 
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #475569; }
        
        input, select { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1px solid #e2e8f0; 
            border-radius: 14px; 
            font-size: 15px; 
            background: white;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        /* 按鈕設計 */
        .btn { padding: 12px 24px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; font-size: 16px; height: 52px; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

        /* 計算結果顯示條 */
        #durationText { 
            background: #dbeafe; 
            color: #1e40af; 
            padding: 15px; 
            border-radius: 14px; 
            text-align: center; 
            font-weight: 800; 
            margin: 20px 0;
            border: 1px solid #bfdbfe;
        }

        /* 班別選擇器 */
        .shift-container { display: flex; gap: 15px; margin-top: 10px; }
        .btn-shift { flex: 1; background: white; border: 2px solid #e2e8f0; color: #64748b; }
        .shift-active { border-color: var(--primary); background: #eff6ff; color: var(--primary); box-shadow: 0 4px 10px rgba(59, 130, 246, 0.15); }

        /* 響應式 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 15px; }
            .main-content { padding: 20px; }
            .form-grid { grid-template-columns: 1fr; }
        }

        /* 維護畫面與 Lightbox 保持原邏輯但微調視覺 */
        #maintenance-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); z-index: 999999;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .btn-lang { background: white; border: 1px solid #e2e8f0; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-left: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* 表格優化 */
        .table-wrapper { background: white; border-radius: 16px; overflow: hidden; box-shadow: var(--card-shadow); border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 16px; text-align: left; color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .status-badge { font-weight: 800; }
        .status-pending { color: var(--warning); }
        .status-approved { color: var(--accent); }
        .status-rejected { color: var(--danger); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="maintenance-overlay">

            <div style="font-size: 60px;">🛠️</div>
            <h1 style="color: #1e293b;">系統維護中</h1>

        <div style="flex-grow: 1;"></div>
        <div class="nav-item" onclick="window.open('https://hr-app-jet-one.vercel.app/attendance', '_blank')" style="color: #a78bfa; font-size: 13px;">🕒 員工出勤系統</div>

    <div class="main-content">
        
        <div id="page-dashboard" class="page-content active">
            <h2 data-vi="📝 Đơn xin nghỉ phép">📝 請假申請</h2>
            <div class="card">

                <div class="form-grid">

                </div>

                <div class="form-grid">
                    <div>

                            <option>管理部</option><option>製造部</option><option>工程部</option><option>SMT</option>
                            <option>資材部</option><option>業務部</option><option>DIP</option><option>品保部</option>
                        </select>
                    </div>
                    <div>
                        <label data-vi="Loại phép">請假類別</label>
                        <select id="leaveType">
                            <option value="事假">事假</option><option value="病假">病假</option><option value="特休">特休</option><option value="公假">公假</option>
                            <option value="產假">產假</option><option value="陪產假">陪產假</option><option value="補休">補休</option><option value="婚假">婚假</option>
                            <option value="生理假">生理假</option><option value="工傷假">工傷假</option><option value="家庭照顧假">家庭照顧假</option>
                        </select>

                <div style="margin-bottom: 25px;">
                    <label data-vi="Chọn ca làm việc">選擇班別</label>

                <div class="form-grid">

                </div>

                <div id="durationText">請點選班別後填寫時間</div>
                
                <div style="margin-bottom: 20px;">
                    <label data-vi="Lý do">請假事由</label>
                    <input type="text" id="reason" placeholder="請詳細說明原因">
                </div>

                <div style="margin-bottom: 25px;">
                    <label data-vi="Tải ảnh bằng chứng">證明文件上傳 <span style="color:red; font-size:12px;">(病假/家庭照顧假必傳)</span></label>
                    <input type="file" id="leaveImg" accept="image/*" multiple style="border:none; padding: 10px 0;">
                    <div id="editPhotoPreview" style="margin-top:10px; display:none;">
                        <div id="currentPhotosContainer" style="display: flex; gap: 8px;"></div>
                    </div>
                </div>

                <button id="submitBtn" class="btn btn-primary" onclick="saveToCloud()" data-vi="Gửi đơn">確認送出申請</button>
                <button id="cancelEditBtn" class="btn" style="width:100%; margin-top:10px; background:#e2e8f0; display:none;" onclick="resetForm()">取消修改</button>
            </div>
        </div>

        <div id="page-search" class="page-content">
            <h2 data-vi="📅 Danh sách duyệt">📅 核准清單</h2>
            <div class="card" style="display:flex; gap:10px; flex-wrap: wrap;">
                <input type="month" id="filterMonth" onchange="applyFilters()" style="width: auto;">
                <select id="filterDept" onchange="applyFilters()" style="width: auto;">
                    <option value="">全部部門</option>
                    <option>管理部</option><option>製造部</option><option>工程部</option><option>SMT</option>
                </select>
                <select id="filterStatus" onchange="applyFilters()" style="width: auto;">
                    <option value="">全部狀態</option>
                    <option value="審核中">審核中</option><option value="批准">批准</option><option value="退件">退件</option>
                </select>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>部門</th><th>工號</th><th>姓名</th><th>假別</th><th>時間</th><th>時數</th><th>證明</th><th>進度</th><th>操作</th></tr>
                    </thead>
                    <tbody id="allTableBody"></tbody>
                </table>
            </div>
            <div style="display:flex; justify-content: center; gap: 15px; margin-top: 15px;">
                <button class="btn-lang" onclick="changePage(-1)">◀ 上一頁</button>
                <span id="pageInfo" style="line-height:35px; font-weight:700;">1 / 1</span>
                <button class="btn-lang" onclick="changePage(1)">下一頁 ▶</button>
            </div>
            <div class="card" style="margin-top:20px; display:flex; align-items:center; gap:15px;">
                <input type="month" id="exportMonth" style="width: 200px;">
                <button class="btn btn-primary" onclick="exportMonthExcel()" style="width:auto; background:#16a34a;">📥 導出 EXCEL</button>
            </div>
        </div>

        <div id="page-admin" class="page-content">
            <h2 id="adminTitle">🛡️ 主管審核中心</h2>
            <div class="card" style="display: flex; justify-content: flex-end;">
                 <button id="bulkApproveBtn" class="btn" style="background:var(--accent); color:white; display:none;" onclick="bulkApprove()">一鍵批准所有申請</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>部門</th><th>姓名 / 假別</th><th>時間</th><th>總時數</th><th>證明</th><th>操作</th></tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
            <div style="display:flex; justify-content: center; gap: 15px; margin-top: 15px;">
                <button class="btn-lang" onclick="changeAdminPage(-1)">◀ 上一頁</button>
                <span id="adminPageInfo" style="line-height:35px; font-weight:700;">1 / 1</span>
                <button class="btn-lang" onclick="changeAdminPage(1)">下一頁 ▶</button>
            </div>
        </div>

        <div id="page-personal" class="page-content">
            <h2 data-vi="🔍 Tra cứu cá nhân">🔍 個人紀錄查詢</h2>
            <div class="card">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="queryEmpId" placeholder="請輸入工號" oninput="this.value = this.value.toUpperCase();">
                    <button class="btn btn-primary" onclick="searchPersonalRecords()" style="width: auto;">查詢</button>
                </div>
                <div id="personalResultArea" style="display:none; margin-top: 25px;">
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>姓名</th><th>假別</th><th>區間</th><th>時數</th><th>證明</th><th>狀態</th><th>操作</th></tr></thead>
                            <tbody id="personalTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    // --- 核心 Firebase 與 邏輯保持不變 (繼承自您的原始碼) ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, getDoc, query, orderBy, where, deleteDoc, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzRmuyxGJSip4k2VANAuUtuJLf25Ft9Pc",
        authDomain: "company-attendance-syste-e3503.firebaseapp.com",
        projectId: "company-attendance-syste-e3503",
        storageBucket: "company-attendance-syste-e3503.firebasestorage.app",
        messagingSenderId: "1092562606409",
        appId: "1:1092562606409:web:24843bace8a4e1e2616298",
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // [以下保留您原始代碼的所有邏輯內容，包含 ManagerEmails, CalcMinutes, saveToCloud 等...]
    // (因代碼量大，此處僅摘錄關鍵串接處，請確保直接貼上時包含您原本所有的 function)

    const managerEmails = { "管理部": "it@tw.topdgi.com,lon.lin@tw.topdgi.com", "製造部": "mark.lu@tw.topdgi.com", "工程部": "tommy.yao@tw.topdgi.com", "SMT": "nick.ho@tw.topdgi.com", "DIP": "mark.lu@tw.topdgi.com,jackson.chan@tw.topdgi.com", "資材部": "mia.hou@tw.topdgi.com", "業務部": "wayne.lee@tw.topdgi.com", "品保部": "it@tw.topdgi.com" };
    const gmTargetIds = ["D220013", "D220002", "D220067", "D220282", "D220134"];
    const gmEmail = "wayne.lee@tw.topdgi.com";
    
    // 初始化月份
    window.addEventListener('DOMContentLoaded', () => {
        const now = new Date();
        const yearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        if (document.getElementById('filterMonth')) document.getElementById('filterMonth').value = yearMonth;
        if (document.getElementById('exportMonth')) document.getElementById('exportMonth').value = yearMonth;
    });

    // 將所有原本在 <script type="module"> 裡的 window.xxxx 函數完整保留...
    // (包含 window.autoFetchName, window.saveToCloud, window.setShift, coreCalcMinutes 等)

    window.switchPage = (id) => {
        document.querySelectorAll('.page-content, .nav-item').forEach(el => el.classList.remove('active'));
        const page = document.getElementById('page-'+id), nav = document.getElementById('nav-'+id);
        if(page) page.classList.add('active'); if(nav) nav.classList.add('active');
        if(id === 'admin') window.loadAdminData();
        if(id === 'search') window.loadAllRecords();
    };

    // 格式化時間 (1 時 30 分)
    function formatDuration(minutes) {
        if (isNaN(minutes)) return "0 時 0 分";
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        return `${h} 時 ${m} 分`;
    }

    // [其餘邏輯 function 保持原樣...]
    // (此處省略部分冗長邏輯，請務必沿用您原文中的邏輯部分)
    
    // --- 原有邏輯函數直接掛載到 window ---
    window.autoFetchName = async () => { /* ...內容同您給的代碼... */ };
    window.setShift = (s) => {
        document.getElementById('hasSelectedShift').value = "true";
        document.querySelectorAll('input[type="date"], input[type="time"]').forEach(el => el.disabled = false);
        document.getElementById('shiftDayBtn').classList.toggle('shift-active', s === 'day');
        document.getElementById('shiftMidBtn').classList.toggle('shift-active', s === 'middle');
        const sd = document.getElementById('startDate').value;
        if(s === 'day'){ 
            document.getElementById('startTime').value="08:30"; document.getElementById('endTime').value="17:30"; 
            if(sd) document.getElementById('endDate').value = sd; 
        } else { 
            document.getElementById('startTime').value="18:00"; document.getElementById('endTime').value="02:30"; 
            if(sd) { let d = new Date(sd); d.setDate(d.getDate() + 1); document.getElementById('endDate').value = d.toISOString().split('T')[0]; } 
        }
        window.autoCalc();
    };
    
    // 計算核心邏輯
    function coreCalcMinutes(d1, t1, d2, t2) {
        if(!d1 || !t1 || !d2 || !t2) return 0;
        let startDT = new Date(`${d1}T${t1}`), endDT = new Date(`${d2}T${t2}`);
        if (endDT <= startDT) return 0;
        const isDayShift = (t1 >= "07:00" && t1 <= "17:30");
        const sWorkTime = isDayShift ? "08:30" : "18:00", eWorkTime = isDayShift ? "17:30" : "02:30";
        const breakStartStr = isDayShift ? "12:00" : "00:00", breakEndStr = isDayShift ? "13:00" : "00:30";
        let totalMinutes = 0, iterDate = new Date(d1), lastDate = new Date(d2);
        while (iterDate <= lastDate) {
            let dayOfWeek = iterDate.getDay();
            if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                let dayStr = iterDate.toISOString().split('T')[0], shiftStart = new Date(`${dayStr}T${sWorkTime}`), shiftEnd = new Date(`${dayStr}T${eWorkTime}`);
                if (!isDayShift) shiftEnd.setDate(shiftEnd.getDate() + 1);
                let actualStart = new Date(Math.max(startDT, shiftStart)), actualEnd = new Date(Math.min(endDT, shiftEnd));
                if (actualStart < actualEnd) {
                    let diffMins = (actualEnd - actualStart) / (1000 * 60);
                    let bS = new Date(`${dayStr}T${breakStartStr}`), bE = new Date(`${dayStr}T${breakEndStr}`);
                    if (!isDayShift) { bS.setDate(bS.getDate() + 1); bE.setDate(bE.getDate() + 1); }
                    let intersectStart = new Date(Math.max(actualStart, bS)), intersectEnd = new Date(Math.min(actualEnd, bE));
                    if (intersectStart < intersectEnd) diffMins -= (intersectEnd - intersectStart) / (1000 * 60);
                    totalMinutes += diffMins;
                }
            }
            iterDate.setDate(iterDate.getDate() + 1);
        }
        return Math.max(0, Math.round(totalMinutes));
    }

    window.autoCalc = () => {
        const min = coreCalcMinutes(document.getElementById('startDate').value, document.getElementById('startTime').value, document.getElementById('endDate').value, document.getElementById('endTime').value);
        const display = formatDuration(min);
        document.getElementById('durationText').innerText = `🕒 計算結果：${display}`;
        return { displayStr: display, totalMinutes: min };
    };
