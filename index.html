<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鼎顓電子 - 員工出勤管理系統</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --sidebar-bg: #1e293b; --main-bg: #f1f5f9; --primary: #3b82f6;
            --accent: #10b981; --danger: #ef4444; --warning: #f59e0b; --text-main: #1e293b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        body { margin: 0; font-family: 'Inter', "Microsoft JhengHei", sans-serif; background: var(--main-bg); color: var(--text-main); display: flex; flex-direction: row; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; }
        .sidebar h1 { font-size: 20px; margin-bottom: 30px; border-left: 5px solid var(--primary); padding-left: 15px; }
        .nav-item { padding: 14px 18px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; color: #94a3b8; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: var(--primary); color: white; }
        .main-content { flex: 1; padding: 40px; box-sizing: border-box; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--card-shadow); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; height: 48px; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-excel { background: #16a34a; color: white; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; }
        .status-confirmed { background: #f0fdf4; color: #15803d; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>鼎顓電子</h1>
        <div class="nav-item active" onclick="switchPage('dashboard')">📝 請假申請</div>
        <div class="nav-item" onclick="switchPage('search')">📅 核准清單導出</div>
        <div class="nav-item" onclick="checkAdminAccess()" style="color:#fbbf24;">🛡️ 主管審核中心</div>
    </div>

    <div class="main-content">
        <div id="page-dashboard" class="page-content active">
            <h2>📝 請假申請</h2>
            <div class="card">
                <div class="form-grid">
                    <div><label>人員工號</label><input type="text" id="empId" oninput="autoFetchName()"></div>
                    <div><label>員工姓名</label><input type="text" id="empName" readonly></div>
                </div>
                <div class="form-grid" style="margin-top:15px;">
                    <div>
                        <label>部門</label>
                        <select id="dept">
                            <option>管理部</option><option>製造部</option><option>工程部</option><option>SMT</option>
                            <option>資材部</option><option>業務部</option><option>DIP</option><option>品保部</option>
                        </select>
                    </div>
                    <div>
                        <label>假別</label>
                        <select id="leaveType"><option>事假</option><option>病假</option><option>特休</option><option>補休</option><option>生理假</option></select>
                    </div>
                </div>
                <div class="form-grid" style="margin-top:15px;">
                    <div><label>開始時間</label><input type="date" id="startDate"><input type="time" id="startTime"></div>
                    <div><label>結束時間</label><input type="date" id="endDate"><input type="time" id="endTime"></div>
                </div>
                <div style="margin-top:15px;"><label>請假事由</label><input type="text" id="reason"></div>
                <button class="btn btn-primary" style="margin-top:20px;" onclick="saveToCloud()">送出申請</button>
            </div>
        </div>

        <div id="page-search" class="page-content">
            <h2>📅 核准清單導出</h2>
            <div class="card">
                <label>選擇導出月份</label>
                <input type="month" id="exportMonth">
                <button class="btn btn-excel" onclick="exportMonthExcel()">📥 依照範本導出 Excel</button>
            </div>
        </div>

        <div id="page-admin" class="page-content">
            <h2 id="adminTitle">🛡️ 主管審核中心</h2>
            <div class="card">
                <table>
                    <thead><tr><th>部門</th><th>姓名</th><th>區間</th><th>狀態</th><th>動作</th></tr></thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, getDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzRmuyxGJSip4k2VANAuUtuJLf25Ft9Pc",
        authDomain: "company-attendance-syste-e3503.firebaseapp.com",
        projectId: "company-attendance-syste-e3503",
        storageBucket: "company-attendance-syste-e3503.firebasestorage.app",
        messagingSenderId: "1092562606409",
        appId: "1:1092562606409:web:24843bace8a4e1e2616298",
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.switchPage = (id) => {
        document.querySelectorAll('.page-content, .nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        if(id === 'admin') loadAdminData();
    };

    window.autoFetchName = async () => {
        const id = document.getElementById('empId').value.trim().toUpperCase();
        if (id.length < 5) return;
        const docSnap = await getDoc(doc(db, "employees", id));
        if (docSnap.exists()) {
            document.getElementById('empName').value = docSnap.data().name;
            document.getElementById('dept').value = docSnap.data().dept;
        }
    };

    window.saveToCloud = async () => {
        const id = document.getElementById('empId').value.trim().toUpperCase();
        const data = {
            id,
            name: document.getElementById('empName').value,
            dept: document.getElementById('dept').value,
            leaveType: document.getElementById('leaveType').value,
            sDate: document.getElementById('startDate').value,
            sTime: document.getElementById('startTime').value,
            eDate: document.getElementById('endDate').value,
            eTime: document.getElementById('endTime').value,
            reason: document.getElementById('reason').value,
            status: "審核中",
            createdAt: new Date()
        };
        await addDoc(collection(db, "formEntries"), data);
        alert("申請成功");
        location.reload();
    };

    window.loadAdminData = async () => {
        const snap = await getDocs(query(collection(db, "formEntries"), where("status", "==", "審核中")));
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = snap.docs.map(d => {
            const r = d.data();
            return `<tr>
                <td>${r.dept}</td>
                <td>${r.name}</td>
                <td>${r.sDate} ${r.sTime}</td>
                <td>${r.status}</td>
                <td><button onclick="updateStatus('${d.id}','批准')">批准</button></td>
            </tr>`;
        }).join('');
    };

    window.updateStatus = async (id, status) => {
        const now = new Date();
        const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
        await updateDoc(doc(db, "formEntries", id), { 
            status: status, 
            approvedAt: timeStr 
        });
        alert("已批准");
        loadAdminData();
    };

    // --- 核心導出功能：嚴格遵守您的範本格式 ---
    window.exportMonthExcel = async () => {
        const m = document.getElementById('exportMonth').value;
        if(!m) return alert("請選擇月份");

        const snap = await getDocs(collection(db, "formEntries"));
        const data = snap.docs.map(d => d.data()).filter(r => r.sDate.startsWith(m) && r.status === "批准");

        if (data.length === 0) return alert("查無核准紀錄");

        // 1. 定義標題列 (與您的範本完全一致)
        const header = [
            "員工代號", "員工姓名", "假別", "出勤日期", 
            "開始日期", "開始時間", "結束日期", "結束時間", 
            "請假時數", "扣伙食費", "扣交通津貼", "事由", "備註", 
            "主管核准時間" // 新增欄位
        ];

        // 2. 格式化內容
        const wsData = [header];

        data.forEach(r => {
            // 計算時數 (假設時數存儲在資料中，如果沒有，這裡用範例 logic 呈現補零 008:00)
            const duration = "008:00"; // 這裡應依據您的時數計算邏輯代入

            wsData.push([
                r.id || '',           // 員工代號
                r.name || '',         // 員工姓名
                r.leaveType || '',    // 假別
                r.sDate || '',        // 出勤日期
                r.sDate || '',        // 開始日期
                r.sTime || '',        // 開始時間
                r.eDate || '',        // 結束日期
                r.eTime || '',        // 結束時間
                duration,              // 請假時數
                '',                   // 扣伙食費 (留空)
                '',                   // 扣交通津貼 (留空)
                r.reason || '',       // 事由
                r.dept || '',         // 備註/部門
                r.approvedAt || ''    // 主管核准時間
            ]);
        });

        // 3. 下載檔案
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        XLSX.utils.book_append_sheet(wb, ws, "Leave_Data");
        XLSX.writeFile(wb, `鼎顓電子_請假報表_${m}.xlsx`);
    };

    window.checkAdminAccess = () => {
        const pwd = prompt("請輸入主管密碼:");
        if (pwd === "888") switchPage('admin'); else alert("密碼錯誤");
    };

</script>
</body>
</html>
