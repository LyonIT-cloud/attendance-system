<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鼎顓電子 - 員工出勤管理系統</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        /* CSS 變數定義：方便統一修改全站顏色 */
        :root {
            --sidebar-bg: #1e293b; --main-bg: #f1f5f9; --primary: #3b82f6;
            --accent: #10b981; --danger: #ef4444; --warning: #f59e0b; --text-main: #1e293b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        /* 基礎佈局：使用 Flexbox 實現側邊欄固定 */
        body { margin: 0; font-family: 'Inter', "Microsoft JhengHei", sans-serif; background: var(--main-bg); color: var(--text-main); display: flex; flex-direction: row; min-height: 100vh; }
        
        /* 側邊導覽列樣式 */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; transition: all 0.3s; }
        
        /* RWD 響應式設計：手機版將側邊欄改為頂部導覽 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 15px; box-sizing: border-box; }
            .form-grid { grid-template-columns: 1fr !important; gap: 15px !important; }
        }

        /* 狀態標籤樣式：根據 status 字串切換顏色 */
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; white-space: nowrap; }
        .status-pending { background: #fff7ed; color: #c2410c; }         /* 審核中 */
        .status-confirmed { background: #f0fdf4; color: #15803d; }       /* 批准 */
        .status-rejected { background: #fef2f2; color: #b91c1c; }        /* 退件 */
        .status-cancel { background: #f1f5f9; color: #64748b; text-decoration: line-through; } /* 已銷假 */
        .status-request-cancel { background: #fff1f2; color: #e11d48; border: 1px solid #fda4af; } /* 申請銷假中 */

        /* 燈箱效果樣式 (證明文件大圖) */
        .img-modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .img-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="btn-lang" onclick="changeLanguage('zh')">繁體</button>
        <button class="btn-lang" onclick="changeLanguage('vi')">Tiếng Việt</button>
    </div>

    <div id="imageLightbox" class="img-modal" onclick="closeLightbox()"><img id="lightboxImg" src=""></div>

    <div class="sidebar">
        <h1 data-vi="CÔNG TY ĐỈNH CHUYÊN">鼎顓電子</h1>
        <div id="nav-dashboard" class="nav-item active" onclick="switchPage('dashboard')" data-vi="📝 Nghỉ phép">📝 請假申請</div>
        <div id="nav-personal" class="nav-item" onclick="switchPage('personal')" data-vi="🔍 Tra cứu">🔍 個人紀錄查詢</div>
        <div id="nav-search" class="nav-item" onclick="switchPage('search')" data-vi="📅 Danh sách">📅 核准清單</div>
        <div id="nav-admin" class="nav-item nav-admin" onclick="checkAdminAccess()" data-vi="🛡️ Quản lý">🛡️ 主管審核中心</div>
    </div>

    <div class="main-content">
        <div id="page-dashboard" class="page-content active">
            <h2 data-vi="📝 Đơn xin nghỉ phép">📝 請假申請</h2>
            <div class="card">
                <div class="form-grid">
                    <div>
                        <label data-vi="Mã số nhân viên">人員工號</label>
                        <input type="text" id="empId" placeholder="例如: D220119" oninput="autoFetchName()" style="text-transform: uppercase;">
                    </div>
                    <div>
                        <label data-vi="員工姓名">員工姓名</label>
                        <input type="text" id="empName" readonly placeholder="輸入工號自動帶入">
                    </div>
                </div>
                <button id="submitBtn" class="btn btn-primary" onclick="saveToCloud()" style="margin-top:25px;" data-vi="Gửi đơn">確認送出申請</button>
            </div>
        </div>

        <div id="page-search" class="page-content">
            <h2 data-vi="📅 Danh sách duyệt">📅 月度核准清單</h2>
            <div class="card" style="padding:15px; display:flex; gap:10px; flex-wrap: wrap; align-items:center;">
                <input type="month" id="filterMonth" onchange="applyFilters()" style="width: 140px;">
                <select id="filterDept" onchange="applyFilters()" style="width: 120px;">
                    <option value="">全部部門</option>
                    <option>管理部</option><option>製造部</option><option>工程部</option><option>SMT</option><option>資材部</option><option>業務部</option><option>DIP</option><option>品保部</option>
                </select>
                <select id="filterStatus" onchange="applyFilters()" style="width: 120px;">
                    <option value="">全部狀態</option>
                    <option value="審核中">審核中</option>
                    <option value="批准">批准</option>
                    <option value="退件">退件</option>
                    <option value="銷假審核中">銷假審核中</option>
                    <option value="銷假">已銷假</option>
                </select>
            </div>
            </div>
    </div>

<script type="module">
    /**
     * 維護備註：Firebase 配置
     * 如果專案遷移或更換 Firebase 帳號，請更新此處的 config
     */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, getDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzRmuyxGJSip4k2VANAuUtuJLf25Ft9Pc",
        authDomain: "company-attendance-syste-e3503.firebaseapp.com",
        projectId: "company-attendance-syste-e3503",
        storageBucket: "company-attendance-syste-e3503.firebasestorage.app",
        messagingSenderId: "1092562606409",
        appId: "1:1092562606409:web:24843bace8a4e1e2616298",
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Google Apps Script URL (用於發送 LINE 或 Email 通知)
    const gasUrl = "https://script.google.com/macros/s/AKfycbwvtShE86BfAZsSKNYnRaQ4mC1wy3CZZPvcwuJGIOq7bRWFX7HZHPWzRfMaX7ydvYsZfw/exec";

    let allRecords = [];        // 存放從資料庫抓取的所有原始紀錄
    let filteredRecords = [];   // 存放經過 UI 篩選後的紀錄
    let currentPage = 1;
    const rowsPerPage = 10;

    /**
     * 維護備註：自動帶入員工資訊
     * 資料來源為 Firestore 中的 "employees" 集合，以工號作為 Document ID
     */
    window.autoFetchName = async () => {
        const id = document.getElementById('empId').value.trim().toUpperCase();
        if (id.length < 5) return; 
        try {
            const docRef = doc(db, "employees", id);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('empName').value = data.name || "";
                if (data.dept) document.getElementById('dept').value = data.dept;
            }
        } catch (e) { console.error("工號查詢失敗:", e); }
    };

    /**
     * 維護備註：資料儲存與圖片壓縮
     * 為了節省 Firebase 儲存空間，上傳的證明文件會在前端先壓縮至 800px 並轉為 Base64 字串
     */
    window.saveToCloud = async () => {

    };

    /**
     * 維護備註：時數計算邏輯 (核心業務邏輯)
     * 目前設定：扣除午休 (12:00~13:00) 與凌晨休 (00:00~00:30)
     * 如果公司更改休假制度，請調整 isDayNoonRest 與 isNightRest 的判斷
     */
    window.autoCalc = () => {
        const d1 = document.getElementById('startDate').value, t1 = document.getElementById('startTime').value;
        const d2 = document.getElementById('endDate').value, t2 = document.getElementById('endTime').value;
        if(!d1 || !t1 || !d2 || !t2) return null;
        let start = new Date(`${d1} ${t1}`), end = new Date(`${d2} ${t2}`);
        if(isNaN(start) || isNaN(end) || end <= start) return null;

        let totalMins = 0;
        let cur = new Date(start);
        while(cur < end) {
            const h = cur.getHours();
            const m = cur.getMinutes();
            const timeInMinutes = h * 60 + m;
            const isDayNoonRest = (timeInMinutes >= 720 && timeInMinutes < 780); // 12:00-13:00
            const isNightRest = (timeInMinutes >= 0 && timeInMinutes < 30);      // 00:00-00:30
            if (!isDayNoonRest && !isNightRest) { totalMins++; }
            cur.setMinutes(cur.getMinutes() + 1);
        }
        // ... (省略格式化輸出) ...
    };

    /**
     * 維護備註：篩選器邏輯 (applyFilters)
     * 這裡實作了「多重條件篩選」：月份 + 部門 + 狀態 + 特定工號(SessionStorage)
     */
    window.applyFilters = () => {
        const filterId = sessionStorage.getItem('targetFilterId'); // 從個人查詢頁跳轉過來的工號
        const filterMonth = document.getElementById('filterMonth').value;
        const filterDept = document.getElementById('filterDept').value;
        const filterStatus = document.getElementById('filterStatus').value;

        filteredRecords = allRecords.filter(r => {
            const matchId = filterId ? r.id === filterId : true;
            const matchMonth = filterMonth ? r.sDate && r.sDate.startsWith(filterMonth) : true;
            const matchDept = filterDept ? r.dept === filterDept : true;
            const matchStatus = filterStatus ? r.status === filterStatus : true;
            return matchId && matchMonth && matchDept && matchStatus;
        });
        // ... (刷新表格 UI) ...
    };

    /**
     * 維護備註：Excel 導出邏輯
     * 導出規則：僅導出「批准」狀態的假單。
     * 人事系統匯入特殊規則：若工號開頭為 F, G, H，匯出時改為小寫（配合特定人事系統需求）
     */
    window.exportMonthExcel = async () => {
        // ... (使用 XLSX 套件產生活頁簿) ...
    };

    /**
     * 多國語言切換 (中文/越文)
     * 原理：將原本的文字存入 dataset.zh，切換時從 data-vi 讀取越文
     */
    window.changeLanguage = (l) => {
        document.querySelectorAll('[data-vi]').forEach(el => {
            if(!el.dataset.zh) el.dataset.zh = el.innerText;
            el.innerText = (l === 'vi') ? el.dataset.vi : el.dataset.zh;
        });
    };

    // 初始化頁面
    window.addEventListener('DOMContentLoaded', () => { switchPage('dashboard'); });
</script>
</body>
</html>
