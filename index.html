<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鼎顓電子 - 員工出勤管理系統</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --sidebar-bg: #1e293b; --main-bg: #f1f5f9; --primary: #3b82f6;
            --accent: #10b981; --danger: #ef4444; --warning: #f59e0b; --text-main: #1e293b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        body { margin: 0; font-family: 'Inter', "Microsoft JhengHei", sans-serif; background: var(--main-bg); color: var(--text-main); display: flex; flex-direction: row; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; transition: all 0.3s; }
        .sidebar h1 { font-size: 20px; margin-bottom: 30px; border-left: 5px solid var(--primary); padding-left: 15px; letter-spacing: 1px; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 15px; box-sizing: border-box; }
            .sidebar h1 { font-size: 18px; margin-bottom: 15px; text-align: center; border: none; padding: 0; }
            .nav-item { padding: 12px !important; font-size: 14px; margin-bottom: 5px !important; justify-content: center; }
            .main-content { padding: 15px !important; }
        }
        .nav-item { padding: 14px 18px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 12px; color: #94a3b8; font-weight: 500; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .nav-admin { border: 1px dashed #475569; margin-top: 10px; color: #fbbf24; }
        .main-content { flex: 1; padding: 40px; overflow-x: hidden; box-sizing: border-box; }
        .page-content { display: none; max-width: 1000px; margin: 0 auto; }
        .page-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--card-shadow); margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #64748b; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 15px; box-sizing: border-box; background-color: #fff; height: 48px; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px; transition: 0.2s; min-height: 48px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-success { background: var(--accent); color: white; }
        .table-wrapper { border-radius: 12px; overflow-x: auto; border: 1px solid #e2e8f0; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #f8fafc; padding: 14px; text-align: left; font-size: 13px; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        td { padding: 14px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1 data-zh="鼎顓電子" data-vi="CÔNG TY ĐỈNH CHUYÊN">鼎顓電子</h1>
        <div id="nav-dashboard" class="nav-item active" onclick="switchPage('dashboard')">📝 請假申請</div>
        <div id="nav-personal" class="nav-item" onclick="switchPage('personal')">🔍 個人紀錄查詢</div>
        <div id="nav-search" class="nav-item" onclick="switchPage('search')">📅 核准清單</div>
        <div id="nav-admin" class="nav-item nav-admin" onclick="checkAdminAccess()">🛡️ 主管審核中心</div>
    </div>

    <div class="main-content">
        <div id="page-dashboard" class="page-content active">
            <h2>📝 請假申請</h2>
            <div class="card">
                <div class="form-grid">
                    <div>
                        <label>人員工號</label>
                        <input type="text" id="empId" placeholder="D220XXX" oninput="autoFetchName()" style="text-transform: uppercase;">
                    </div>
                    <div>
                        <label>員工姓名</label>
                        <input type="text" id="empName" readonly>
                    </div>
                </div>
                <div class="form-grid">
                    <div>
                        <label>所屬部門</label>
                        <input type="text" id="dept" readonly>
                    </div>
                    <div>
                        <label>請假類別</label>
                        <select id="leaveType">
                            <option>事假</option><option>病假</option><option>特休</option><option>公假</option><option>產假</option>
                        </select>
                    </div>
                </div>
                <button id="submitBtn" class="btn btn-primary" onclick="saveToCloud()" style="margin-top:10px;">確認送出申請</button>
            </div>
        </div>

        <div id="page-admin" class="page-content">
            <h2 id="adminTitle">🛡️ 主管審核中心</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>部門</th><th>姓名/職稱</th><th>假別</th><th>申請區間</th><th>動作</th></tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, getDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzRmuyxGJSip4k2VANAuUtuJLf25Ft9Pc",
        authDomain: "company-attendance-syste-e3503.firebaseapp.com",
        projectId: "company-attendance-syste-e3503",
        storageBucket: "company-attendance-syste-e3503.firebasestorage.app",
        messagingSenderId: "1092562606409",
        appId: "1:1092562606409:web:24843bace8a4e1e2616298",
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.currentAdminDept = "ALL";
    window.currentAdminLevel = "STAFF"; // STAFF 或 MANAGER

    // 自動抓取姓名與職等
    window.autoFetchName = async () => {
        const id = document.getElementById('empId').value.trim().toUpperCase();
        if (id.length < 5) return;
        const docSnap = await getDoc(doc(db, "employees", id));
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('empName').value = data.name;
            document.getElementById('dept').value = data.dept || "";
            // 重要：申請時就把該員工當下的職位標記起來
            window.tempUserPos = data.position || "一般職員"; 
        }
    };

    // 儲存申請 (必須包含職稱 position)
    window.saveToCloud = async () => {
        const id = document.getElementById('empId').value.trim().toUpperCase();
        const name = document.getElementById('empName').value;
        if(!id || !name) return alert("請確認工號");

        try {
            await addDoc(collection(db, "formEntries"), {
                id, name, 
                dept: document.getElementById('dept').value,
                position: window.tempUserPos || "一般職員",
                leaveType: document.getElementById('leaveType').value,
                status: "審核中", 
                createdAt: new Date(),
                sDate: new Date().toLocaleDateString() // 範例簡化
            });
            alert("申請成功"); location.reload();
        } catch(e) { alert("送出失敗"); }
    };

    // 密碼權限分流
    window.checkAdminAccess = () => {
        const pwd = prompt("請輸入主管審核密碼:");
        if(!pwd) return;

        const highLevelTitles = ["經理", "副理", "特助"];

        // 定義密碼與權限
        const authMap = {
            "top999": { level: "MANAGER", dept: "ALL" },  // 專門看 經理、副理、特助
            "hr888":  { level: "STAFF", dept: "ALL" },    // 看全公司的一般職員
            "mfg888": { level: "STAFF", dept: "製造部" }  // 看製造部的一般職員
        };

        if (authMap[pwd]) {
            window.currentAdminLevel = authMap[pwd].level;
            window.currentAdminDept = authMap[pwd].dept;
            switchPage('admin');
            
            const titlePrefix = (window.currentAdminLevel === "MANAGER") ? "高階主管審核(經理/副理/特助)" : "部門審核中心";
            document.getElementById('adminTitle').innerText = `🛡️ ${titlePrefix} - ${window.currentAdminDept}`;
            loadAdminData();
        } else {
            alert("密碼錯誤");
        }
    };

    // 載入審核清單 (包含特助過濾邏輯)
    window.loadAdminData = async () => {
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = "<tr><td colspan='5' style='text-align:center'>載入中...</td></tr>";
        
        const q = query(collection(db, "formEntries"), orderBy("createdAt", "desc"), limit(60));
        const snap = await getDocs(q);
        const highLevelTitles = ["經理", "副理", "特助"];

        const filtered = snap.docs.filter(d => {
            const r = d.data();
            if (r.status !== "審核中") return false;

            // 分流過濾：
            if (window.currentAdminLevel === "MANAGER") {
                // top999 登入：只看 職稱為 經理、副理、特助 的人
                return highLevelTitles.includes(r.position);
            } else {
                // 一般部門密碼登入：排除高階職位，並檢查部門
                const isDeptMatch = (window.currentAdminDept === "ALL" || r.dept === window.currentAdminDept);
                const isNotHighLevel = !highLevelTitles.includes(r.position);
                return isDeptMatch && isNotHighLevel;
            }
        });

        tbody.innerHTML = filtered.map(d => {
            const r = d.data();
            return `<tr>
                <td>${r.dept}</td>
                <td><b>${r.name}</b><br><small>${r.position || '一般'}</small></td>
                <td>${r.leaveType}</td>
                <td>${r.sDate || '-'}</td>
                <td>
                    <button class="btn btn-success" onclick="updateStatus('${d.id}','批准')" style="padding:5px 15px; min-height:30px;">批准</button>
                </td>
            </tr>`;
        }).join('');

        if(filtered.length === 0) tbody.innerHTML = "<tr><td colspan='5' style='text-align:center'>目前無待審核單據</td></tr>";
    };

    window.switchPage = (id) => {
        document.querySelectorAll('.page-content, .nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
    };

    window.updateStatus = async (id, s) => {
        if(!confirm("確定批准嗎？")) return;
        await updateDoc(doc(db, "formEntries", id), { status: s });
        loadAdminData();
    };

</script>
</body>
</html>
