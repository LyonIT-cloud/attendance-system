<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鼎顓電子 - 員工出勤管理系統</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --sidebar-bg: #1e293b; --main-bg: #f1f5f9; --primary: #3b82f6;
            --accent: #10b981; --danger: #ef4444; --warning: #f59e0b; --text-main: #1e293b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --maintenance-display: none; 
        }
        body { margin: 0; font-family: 'Inter', "Microsoft JhengHei", sans-serif; background: var(--main-bg); color: var(--text-main); display: flex; flex-direction: row; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; transition: all 0.3s; }
        .sidebar h1 { font-size: 20px; margin-bottom: 30px; border-left: 5px solid var(--primary); padding-left: 15px; letter-spacing: 1px; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 15px; box-sizing: border-box; }
            .main-content { padding: 15px !important; }
            .form-grid { grid-template-columns: 1fr !important; }
        }

        .lang-switcher { position: fixed; top: 15px; right: 20px; z-index: 1000; display: flex; gap: 8px; }
        .btn-lang { background: white; border: 1px solid #e2e8f0; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .nav-item { padding: 14px 18px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 12px; color: #94a3b8; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-admin { border: 1px dashed #475569; margin-top: 10px; color: #fbbf24; }
        
        .main-content { flex: 1; padding: 40px; overflow-x: hidden; box-sizing: border-box; }
        .page-content { display: none; max-width: 1000px; margin: 0 auto; }
        .page-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--card-shadow); margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #64748b; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 15px; box-sizing: border-box; height: 48px; }
        input:disabled { background-color: #f8fafc; cursor: not-allowed; }

        .btn { padding: 12px 20px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-height: 48px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-excel { background: #16a34a; color: white; }
        .shift-active { border: 2px solid var(--primary) !important; background: #eff6ff !important; color: var(--primary) !important; }
        
        .table-wrapper { border-radius: 12px; overflow-x: auto; border: 1px solid #e2e8f0; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th { background: #f8fafc; padding: 14px; text-align: left; font-size: 13px; color: #64748b; }
        td { padding: 14px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        .status-badge { font-weight: 700; }
        .status-approved { color: var(--accent); }
        .status-rejected { color: var(--danger); }
        .status-pending { color: var(--warning); }

        .img-modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .img-modal img { max-width: 90%; max-height: 90%; border: 3px solid white; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="btn-lang" onclick="changeLanguage('zh')">繁體</button>
        <button class="btn-lang" onclick="changeLanguage('vi')">Tiếng Việt</button>
    </div>

    <div id="imageLightbox" class="img-modal" onclick="closeLightbox()">
        <img id="lightboxImg" src="">
    </div>

    <div class="sidebar">
        <h1 data-vi="CÔNG TY ĐỈNH CHUYÊN">鼎顓電子</h1>
        <div id="nav-dashboard" class="nav-item active" onclick="switchPage('dashboard')" data-vi="📝 Nghỉ phép">📝 請假申請</div>
        <div id="nav-personal" class="nav-item" onclick="switchPage('personal')" data-vi="🔍 Tra cứu">🔍 個人紀錄查詢</div>
        <div id="nav-search" class="nav-item" onclick="switchPage('search')" data-vi="📅 Danh sách">📅 核准清單</div>
        <div id="nav-admin" class="nav-item nav-admin" onclick="checkAdminAccess()" data-vi="🛡️ Quản lý">🛡️ 主管審核中心</div>
    </div>

    <div class="main-content">
        <div id="page-dashboard" class="page-content active">
            <h2 data-vi="📝 Đơn xin nghỉ phép">📝 請假申請</h2>
            <div class="card">
                <input type="hidden" id="editDocId">
                <div class="form-grid">
                    <div>
                        <label data-vi="Mã số nhân viên">人員工號</label>
                        <input type="text" id="empId" placeholder="例如: D220119" oninput="autoFetchName()" style="text-transform: uppercase;">
                    </div>
                    <div>
                        <label data-vi="Tên nhân viên">員工姓名</label>
                        <input type="text" id="empName" readonly placeholder="自動帶入">
                    </div>
                </div>
                <div class="form-grid">
                    <div>
                        <label data-vi="Bộ phận">所屬部門</label>
                        <select id="dept">
                            <option value="">--選擇部門--</option>
                            <option>管理部</option><option>製造部</option><option>工程部</option><option>SMT</option>
                            <option>資材部</option><option>業務部</option><option>DIP</option><option>品保部</option>
                        </select>
                    </div>
                    <div>
                        <label data-vi="Loại phép">請假類別</label>
                        <select id="leaveType">
                            <option>事假</option><option>病假</option><option>特休</option><option>公假</option>
                            <option>產假</option><option>陪產假</option><option>補休</option><option>婚假</option>
                        </select>
                    </div>
                </div>
                
                <div class="card" style="background: #f8fafc; border: 1px solid #e2e8f0;">
                    <label data-vi="Chọn ca làm việc">選擇班別</label>
                    <div style="display: flex; gap: 15px;">
                        <button class="btn" style="flex: 1; background: #fff; border: 2px solid #e2e8f0;" onclick="setShift('day')" id="shiftDayBtn">☀️ 早班</button>
                        <button class="btn" style="flex: 1; background: #fff; border: 2px solid #e2e8f0;" onclick="setShift('middle')" id="shiftMidBtn">🌙 中班</button>
                    </div>
                    <input type="hidden" id="hasSelectedShift" value="false">
                </div>

                <div class="form-grid" style="margin-top:20px;">
                    <div>
                        <label data-vi="Thời gian bắt đầu">起始時間</label>
                        <div style="display:flex; gap:5px;">
                            <input type="date" id="startDate" onchange="autoCalc()" disabled>
                            <input type="time" id="startTime" onchange="autoCalc()" disabled>
                        </div>
                    </div>
                    <div>
                        <label data-vi="Thời gian 結束">結束時間</label>
                        <div style="display:flex; gap:5px;">
                            <input type="date" id="endDate" onchange="autoCalc()" disabled>
                            <input type="time" id="endTime" onchange="autoCalc()" disabled>
                        </div>
                    </div>
                </div>
                <div id="durationText" style="color:var(--primary); font-weight:600; padding: 12px; background: #eff6ff; border-radius: 10px; margin: 15px 0; text-align: center; border: 1px dashed var(--primary);">請選擇班別</div>
                
                <div><label data-vi="Lý do">請假事由</label><input type="text" id="reason"></div>
                <div style="margin-top:15px;">
                    <label data-vi="Tải ảnh bằng chứng">證明文件 <span style="color:red; font-size:12px;">(病假必傳)</span></label>
                    <input type="file" id="leaveImg" accept="image/*">
                </div>
                <button id="submitBtn" class="btn btn-primary" onclick="saveToCloud()" style="margin-top:25px;" data-vi="Gửi đơn">確認送出申請</button>
            </div>
        </div>

        <div id="page-search" class="page-content">
            <h2 data-vi="📅 Danh sách duyệt">📅 核准清單</h2>
            <div class="card" style="padding:15px; display:flex; gap:10px; align-items:center;">
                <input type="month" id="filterMonth" onchange="applyFilters()">
                <button class="btn btn-excel" onclick="exportMonthExcel()">📥 導出導入專用 Excel</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>部門</th><th>工號</th><th>姓名</th><th>假別</th><th>時間</th><th>時數</th><th>狀態</th><th>動作</th></tr>
                    </thead>
                    <tbody id="allTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="page-personal" class="page-content">
            <h2>🔍 個人紀錄查詢</h2>
            <div class="card">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="queryEmpId" placeholder="輸入工號">
                    <button class="btn btn-primary" style="width:auto" onclick="searchPersonalRecords()">搜尋</button>
                </div>
                <div id="personalResultArea" style="margin-top:20px">
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>假別</th><th>開始</th><th>結束</th><th>時數</th><th>狀態</th></tr></thead>
                            <tbody id="personalTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-admin" class="page-content">
            <h2 id="adminTitle">🛡️ 主管審核中心</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>姓名/部門</th><th>假別</th><th>時間區間</th><th>總時數</th><th>證明</th><th>核准</th></tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, getDoc, query, orderBy, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzRmuyxGJSip4k2VANAuUtuJLf25Ft9Pc",
        authDomain: "company-attendance-syste-e3503.firebaseapp.com",
        projectId: "company-attendance-syste-e3503",
        storageBucket: "company-attendance-syste-e3503.firebasestorage.app",
        messagingSenderId: "1092562606409",
        appId: "1:1092562606409:web:24843bace8a4e1e2616298",
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allRecords = []; 
    const adminPasswords = { "hr888": "ALL", "mgt888": "管理部", "mfg888": "製造部" };
    let currentAdminDept = "";

    // 核心工具：獲取資料
    function safeGet(r, keys) {
        for(let k of keys) { if(r[k]) return r[k]; }
        return "";
    }

    // --- 關鍵修正：Excel 匯出邏輯 ---
    window.exportMonthExcel = async () => {
        const m = document.getElementById('filterMonth').value; 
        if(!m) return alert("請選擇月份");

        try {
            const snap = await getDocs(query(collection(db, "formEntries"), where("status", "==", "批准")));
            const data = snap.docs.map(d => d.data()).filter(r => {
                const sd = safeGet(r, ['sDate', 'startDate']);
                return sd && sd.startsWith(m);
            });

            if (data.length === 0) return alert("該月份無核准紀錄");

            const header = ["員工代號", "員工姓名", "假別", "出勤日期", "開始日期", "開始時間", "結束日期", "結束時間", "請假時數", "事由"];
            
            const rows = data.map(r => {
                const sd = safeGet(r, ['sDate', 'startDate']);
                const st = safeGet(r, ['sTime', 'startTime']);
                const ed = safeGet(r, ['eDate', 'endDate']);
                const et = safeGet(r, ['eTime', 'endTime']);
                
                // 【核心要求實現】
                // 1. 先全部轉小寫 (FGH 就會變小寫)
                // 2. 如果開頭是 d，將其替換為大寫 D
                let rawId = (r.id || "").toLowerCase();
                let processedId = rawId.startsWith('d') ? 'D' + rawId.slice(1) : rawId;
                
                const totalMin = r.totalMinutes || 0;
                const hh = String(Math.floor(totalMin / 60)).padStart(2, '0');
                const mm = String(totalMin % 60).padStart(2, '0');
                
                return [processedId, r.name, r.leaveType, sd, sd, st, ed, et, `${hh}:${mm}`, r.reason || ""];
            });

            const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "請假導出");
            XLSX.writeFile(wb, `鼎顓_導入報表_${m}.xlsx`);
        } catch (e) { alert("匯出失敗: " + e.message); }
    };

    // 其他原有功能保持專業運作
    window.autoFetchName = async () => {
        const id = document.getElementById('empId').value.trim().toUpperCase();
        if(id.length < 4) return;
        const snap = await getDoc(doc(db, "employees", id));
        if(snap.exists()){
            document.getElementById('empName').value = snap.data().name;
            document.getElementById('dept').value = snap.data().dept;
        }
    };

    window.setShift = (s) => {
        document.getElementById('hasSelectedShift').value = "true";
        document.querySelectorAll('input[type="date"], input[type="time"]').forEach(el => el.disabled = false);
        document.getElementById('shiftDayBtn').classList.toggle('shift-active', s === 'day');
        document.getElementById('shiftMidBtn').classList.toggle('shift-active', s === 'middle');
        
        if(s === 'day'){
            document.getElementById('startTime').value = "08:30";
            document.getElementById('endTime').value = "17:30";
        } else {
            document.getElementById('startTime').value = "18:00";
            document.getElementById('endTime').value = "02:30";
        }
        window.autoCalc();
    };

    window.autoCalc = () => {
        const d1 = document.getElementById('startDate').value;
        const t1 = document.getElementById('startTime').value;
        const d2 = document.getElementById('endDate').value;
        const t2 = document.getElementById('endTime').value;
        if(!d1 || !t1 || !d2 || !t2) return { totalMinutes: 0 };

        // 簡易計算邏輯 (此處可按需求精確化)
        let start = new Date(`${d1} ${t1}`), end = new Date(`${d2} ${t2}`);
        let diff = (end - start) / (1000 * 60);
        if(diff < 0) diff = 0;
        
        const h = Math.floor(diff / 60), m = diff % 60;
        document.getElementById('durationText').innerText = `🕒 計算結果：${h} 時 ${m} 分`;
        return { totalMinutes: diff, display: `${h} 時 ${m} 分` };
    };

    window.saveToCloud = async () => {
        if(document.getElementById('hasSelectedShift').value !== "true") return alert("請先選擇班別");
        const calc = window.autoCalc();
        const payload = {
            id: document.getElementById('empId').value.toUpperCase(),
            name: document.getElementById('empName').value,
            dept: document.getElementById('dept').value,
            leaveType: document.getElementById('leaveType').value,
            startDate: document.getElementById('startDate').value,
            startTime: document.getElementById('startTime').value,
            endDate: document.getElementById('endDate').value,
            endTime: document.getElementById('endTime').value,
            totalMinutes: calc.totalMinutes,
            reason: document.getElementById('reason').value,
            status: "審核中",
            createdAt: new Date()
        };
        await addDoc(collection(db, "formEntries"), payload);
        alert("申請已送出");
        location.reload();
    };

    window.switchPage = (id) => {
        document.querySelectorAll('.page-content, .nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
        if(id === 'search') window.loadAllData();
    };

    window.loadAllData = async () => {
        const snap = await getDocs(query(collection(db, "formEntries"), orderBy("createdAt", "desc")));
        const tbody = document.getElementById('allTableBody');
        tbody.innerHTML = snap.docs.map(d => {
            const r = d.data();
            return `<tr><td>${r.dept}</td><td>${r.id}</td><td>${r.name}</td><td>${r.leaveType}</td><td>${r.startDate}</td><td>${Math.floor(r.totalMinutes/60)}h</td><td><span class="status-badge status-${r.status==='批准'?'approved':'pending'}">${r.status}</span></td><td>-</td></tr>`;
        }).join('');
    };

    window.checkAdminAccess = () => {
        const pwd = prompt("請輸入密碼:");
        if(adminPasswords[pwd]){
            currentAdminDept = adminPasswords[pwd];
            switchPage('admin');
            window.loadAdminData();
        } else { alert("密碼錯誤"); }
    };

    window.loadAdminData = async () => {
        let q = currentAdminDept === "ALL" ? query(collection(db, "formEntries"), where("status", "==", "審核中")) : query(collection(db, "formEntries"), where("status", "==", "審核中"), where("dept", "==", currentAdminDept));
        const snap = await getDocs(q);
        document.getElementById('adminTableBody').innerHTML = snap.docs.map(d => {
            const r = d.data();
            return `<tr><td>${r.name}<br>${r.dept}</td><td>${r.leaveType}</td><td>${r.startDate} ${r.startTime}</td><td>${Math.floor(r.totalMinutes/60)}小時</td><td>-</td><td><button onclick="updateStatus('${d.id}', '批准')">准</button></td></tr>`;
        }).join('');
    };

    window.updateStatus = async (id, s) => {
        await updateDoc(doc(db, "formEntries", id), { status: s });
        alert("已更新");
        window.loadAdminData();
    };

    window.onload = () => {
        document.getElementById('filterMonth').value = new Date().toISOString().slice(0, 7);
    };
</script>
</body>
</html>
