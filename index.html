<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鼎顓電子 - 員工出勤管理系統</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --sidebar-bg: #1e293b; --main-bg: #f1f5f9; --primary: #3b82f6;
            --accent: #10b981; --danger: #ef4444; --warning: #f59e0b; --text-main: #1e293b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        body { margin: 0; font-family: 'Inter', "Microsoft JhengHei", sans-serif; background: var(--main-bg); color: var(--text-main); display: flex; flex-direction: row; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; transition: all 0.3s; }
        .sidebar h1 { font-size: 20px; margin-bottom: 30px; border-left: 5px solid var(--primary); padding-left: 15px; letter-spacing: 1px; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; padding: 15px; box-sizing: border-box; }
            .sidebar h1 { font-size: 18px; margin-bottom: 15px; text-align: center; border: none; padding: 0; }
            .nav-item { padding: 12px !important; font-size: 14px; margin-bottom: 5px !important; justify-content: center; }
            .main-content { padding: 15px !important; }
            .form-grid { grid-template-columns: 1fr !important; gap: 15px !important; }
        }
        .lang-switcher { position: fixed; top: 15px; right: 20px; z-index: 1000; display: flex; gap: 8px; }
        .btn-lang { background: white; border: 1px solid #e2e8f0; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .nav-item { padding: 14px 18px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 12px; color: #94a3b8; font-weight: 500; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .nav-admin { border: 1px dashed #475569; margin-top: 10px; color: #fbbf24; }
        .main-content { flex: 1; padding: 40px; overflow-x: hidden; box-sizing: border-box; }
        .page-content { display: none; max-width: 1000px; margin: 0 auto; }
        .page-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--card-shadow); margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #64748b; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 15px; box-sizing: border-box; background-color: #fff; height: 48px; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; min-height: 48px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-success { background: var(--accent); color: white; }
        .table-wrapper { border-radius: 12px; overflow-x: auto; border: 1px solid #e2e8f0; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #f8fafc; padding: 14px; text-align: left; font-size: 13px; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        td { padding: 14px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #fff7ed; color: #c2410c; }
        .status-confirmed { background: #f0fdf4; color: #15803d; }
        .img-modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .img-modal img { max-width: 90%; max-height: 90%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="btn-lang" onclick="changeLanguage('zh')">繁體</button>
        <button class="btn-lang" onclick="changeLanguage('vi')">Tiếng Việt</button>
    </div>

    <div id="imageLightbox" class="img-modal" onclick="closeLightbox()"><img id="lightboxImg" src=""></div>

    <div class="sidebar">
        <h1>鼎顓電子</h1>
        <div id="nav-dashboard" class="nav-item active" onclick="switchPage('dashboard')">📝 請假申請</div>
        <div id="nav-personal" class="nav-item" onclick="switchPage('personal')">🔍 個人紀錄查詢</div>
        <div id="nav-search" class="nav-item" onclick="switchPage('search')">📅 核准清單</div>
        <div id="nav-admin" class="nav-item nav-admin" onclick="checkAdminAccess()">🛡️ 主管審核中心</div>
    </div>

    <div class="main-content">
        <div id="page-dashboard" class="page-content active">
            <h2>📝 請假申請</h2>
            <div class="card">
                <div class="form-grid">
                    <div>
                        <label>人員工號</label>
                        <input type="text" id="empId" placeholder="例如: D220119" oninput="autoFetchName()" style="text-transform: uppercase;">
                    </div>
                    <div>
                        <label>員工姓名</label>
                        <input type="text" id="empName" readonly placeholder="自動帶入">
                    </div>
                </div>
                
                <div class="card" style="background: #f8fafc; border: 1px solid #e2e8f0; margin-bottom: 20px;">
                    <label>選擇班別</label>
                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                        <button class="btn" style="flex: 1; background: #fff; border: 2px solid #e2e8f0;" onclick="setShift('day')" id="shiftDayBtn">☀️ 早班 (08:30~17:30)</button>
                        <button class="btn" style="flex: 1; background: #fff; border: 2px solid #e2e8f0;" onclick="setShift('middle')" id="shiftMidBtn">🌙 中班 (18:00~02:30)</button>
                    </div>
                </div>

                <div class="form-grid">
                    <div>
                        <label>起始時間</label>
                        <div style="display:flex; gap:5px;">
                            <input type="date" id="startDate" onchange="autoCalc()">
                            <input type="time" id="startTime" onchange="autoCalc()">
                        </div>
                    </div>
                    <div>
                        <label>結束時間</label>
                        <div style="display:flex; gap:5px;">
                            <input type="date" id="endDate" onchange="autoCalc()">
                            <input type="time" id="endTime" onchange="autoCalc()">
                        </div>
                    </div>
                </div>
                <div id="durationText" style="color:var(--primary); font-weight:600; padding: 12px; background: #eff6ff; border-radius: 10px; margin: 15px 0; text-align: center; border: 1px dashed var(--primary);">請確認班別與日期</div>
                
                <div class="form-grid">
                    <div>
                        <label>所屬部門</label>
                        <select id="dept">
                            <option value="">--選擇部門--</option>
                            <option>管理部</option><option>製造部</option><option>工程部</option><option>SMT</option>
                            <option>資材部</option><option>業務部</option><option>DIP</option><option>品保部</option>
                        </select>
                    </div>
                    <div>
                        <label>請假類別</label>
                        <select id="leaveType">
                            <option>事假</option><option>病假</option><option>特休</option><option>公假</option><option>補休</option>
                        </select>
                    </div>
                </div>
                
                <input type="text" id="reason" placeholder="請詳細說明原因" style="margin-top:10px;">
                <div style="margin-top:15px;"><label>證明文件照片</label><input type="file" id="leaveImg" accept="image/*"></div>
                <button id="submitBtn" class="btn btn-primary" onclick="saveToCloud()" style="margin-top:25px;">確認送出申請</button>
            </div>
        </div>
        
        <div id="page-personal" class="page-content"><h2>🔍 個人紀錄查詢</h2><div class="card"><div style="display:flex; gap:10px;"><input type="text" id="queryEmpId" placeholder="輸入工號"><button class="btn btn-success" onclick="searchPersonalRecords()">查詢</button></div></div></div>
        <div id="page-search" class="page-content"><h2>📅 月度核准清單</h2><div class="table-wrapper"><table><thead><tr><th>部門</th><th>工號</th><th>姓名</th><th>假別</th><th>區間</th><th>時數</th><th>狀態</th><th>照片</th></tr></thead><tbody id="allTableBody"></tbody></table></div></div>
        <div id="page-admin" class="page-content"><h2>🛡️ 主管審核中心</h2><div class="table-wrapper"><table><thead><tr><th>姓名</th><th>區間</th><th>時數</th><th>證明</th><th>動作</th></tr></thead><tbody id="adminTableBody"></tbody></table></div></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzRmuyxGJSip4k2VANAuUtuJLf25Ft9Pc",
        authDomain: "company-attendance-syste-e3503.firebaseapp.com",
        projectId: "company-attendance-syste-e3503",
        storageBucket: "company-attendance-syste-e3503.firebasestorage.app",
        messagingSenderId: "1092562606409",
        appId: "1:1092562606409:web:24843bace8a4e1e2616298",
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentShift = 'day';

    window.setShift = (shift) => {
        currentShift = shift;
        document.getElementById('startTime').value = (shift === 'day') ? "08:30" : "18:00";
        document.getElementById('endTime').value = (shift === 'day') ? "17:30" : "02:30";
        
        const dayBtn = document.getElementById('shiftDayBtn');
        const midBtn = document.getElementById('shiftMidBtn');
        dayBtn.style.borderColor = (shift === 'day') ? "var(--primary)" : "#e2e8f0";
        midBtn.style.borderColor = (shift === 'middle') ? "var(--primary)" : "#e2e8f0";
        autoCalc();
    };

    window.autoCalc = () => {
        const d1 = document.getElementById('startDate').value, t1 = document.getElementById('startTime').value;
        const d2 = document.getElementById('endDate').value, t2 = document.getElementById('endTime').value;
        if(!d1 || !t1 || !d2 || !t2) return null;

        let startDT = new Date(`${d1} ${t1}`), endDT = new Date(`${d2} ${t2}`);
        if(endDT <= startDT) return null;

        let totalMins = 0;
        let curDate = new Date(startDT);
        curDate.setHours(0,0,0,0); // 從起始日的前一刻開始跑

        // 定義班別時間（分鐘計）
        const dayStart = 8*60+30, dayEnd = 17*60+30, dayRestS = 12*60, dayRestE = 13*60;
        const midStart = 18*60, midEnd = 26*60+30, midRestS = 24*60, midRestE = 24*60+30; // 跨夜加24小時

        // 遍歷每一天
        let tempDate = new Date(curDate);
        const limitDate = new Date(endDT);
        limitDate.setDate(limitDate.getDate() + 1);

        while(tempDate <= limitDate) {
            let shiftS, shiftE, restS, restE;
            if(currentShift === 'day') {
                shiftS = new Date(tempDate); shiftS.setMinutes(dayStart);
                shiftE = new Date(tempDate); shiftE.setMinutes(dayEnd);
                restS = new Date(tempDate); restS.setMinutes(dayRestS);
                restE = new Date(tempDate); restE.setMinutes(dayRestE);
            } else {
                shiftS = new Date(tempDate); shiftS.setMinutes(midStart);
                shiftE = new Date(tempDate); shiftE.setMinutes(midEnd);
                restS = new Date(tempDate); restS.setMinutes(midRestS);
                restE = new Date(tempDate); restE.setMinutes(midRestE);
            }

            // 計算請假範圍與上班範圍的交集
            let actualS = new Date(Math.max(startDT, shiftS));
            let actualE = new Date(Math.min(endDT, shiftE));

            if(actualS < actualE) {
                let diff = (actualE - actualS) / 1000 / 60;
                // 扣除交集內的休息時間
                let overlapRestS = new Date(Math.max(actualS, restS));
                let overlapRestE = new Date(Math.min(actualE, restE));
                if(overlapRestS < overlapRestE) {
                    diff -= (overlapRestE - overlapRestS) / 1000 / 60;
                }
                totalMins += diff;
            }
            tempDate.setDate(tempDate.getDate() + 1);
        }

        const h = Math.floor(totalMins / 60), m = Math.round(totalMins % 60);
        const display = `${h} 時 ${m} 分`;
        document.getElementById('durationText').innerText = `🕒 計算結果：${display}`;
        return { totalMins, display };
    };

    // 儲存與其他邏輯
    window.saveToCloud = async () => {
        const calc = autoCalc();
        if(!calc) return alert("請檢查時間");
        const id = document.getElementById('empId').value.toUpperCase();
        const name = document.getElementById('empName').value;
        const leaveType = document.getElementById('leaveType').value;
        const file = document.getElementById('leaveImg').files[0];

        if(leaveType === "病假" && !file) return alert("病假必須傳照片");
        if(leaveType === "特休" && calc.totalMins < 60) return alert("特休最少1小時");

        try {
            let photo = "";
            if(file) photo = await toBase64(file);
            await addDoc(collection(db, "formEntries"), {
                id, name, dept: document.getElementById('dept').value,
                leaveType, shift: currentShift,
                sDate: document.getElementById('startDate').value, sTime: document.getElementById('startTime').value,
                eDate: document.getElementById('endDate').value, eTime: document.getElementById('endTime').value,
                displayDuration: calc.display, status: "審核中", photo, createdAt: new Date()
            });
            alert("成功"); location.reload();
        } catch(e) { alert(e.message); }
    };

    function toBase64(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result);
            reader.readAsDataURL(file);
        });
    }

    window.autoFetchName = async () => {
        const id = document.getElementById('empId').value.toUpperCase();
        if(id.length < 5) return;
        const snap = await getDoc(doc(db, "employees", id));
        if(snap.exists()) {
            document.getElementById('empName').value = snap.data().name;
            document.getElementById('dept').value = snap.data().dept || "";
        }
    };

    window.switchPage = (id) => {
        document.querySelectorAll('.page-content, .nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
        if(id === 'search' || id === 'admin') loadData(id);
    };

    async function loadData(page) {
        const snap = await getDocs(query(collection(db, "formEntries"), orderBy("createdAt", "desc")));
        const rows = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
        const target = page === 'search' ? 'allTableBody' : 'adminTableBody';
        document.getElementById(target).innerHTML = rows.map(r => `
            <tr>
                <td>${r.name}</td>
                <td>${r.sDate} ~ ${r.eDate}</td>
                <td>${r.displayDuration}</td>
                <td>${r.photo ? `<button onclick="openLightbox('${r.photo}')">看圖</button>` : '-'}</td>
                <td>${page === 'admin' ? `<button onclick="updateStatus('${r.docId}','批准')">准</button>` : r.status}</td>
            </tr>
        `).join('');
    }

    window.updateStatus = async (id, status) => {
        await updateDoc(doc(db, "formEntries", id), { status });
        loadData('admin');
    };

    window.openLightbox = (src) => { document.getElementById('lightboxImg').src = src; document.getElementById('imageLightbox').style.display = 'flex'; };
    window.closeLightbox = () => { document.getElementById('imageLightbox').style.display = 'none'; };
    window.setShift('day');
</script>
</body>
</html>
