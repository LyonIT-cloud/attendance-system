<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鼎顓電子 - 員工出勤管理系統</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --sidebar-bg: #1e293b; --main-bg: #f1f5f9; --primary: #3b82f6;
            --accent: #10b981; --danger: #ef4444; --warning: #f59e0b; --text-main: #1e293b;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        body { margin: 0; font-family: 'Inter', "Microsoft JhengHei", sans-serif; background: var(--main-bg); color: var(--text-main); display: flex; min-height: 100vh; overflow: hidden; }
        .lang-switcher { position: fixed; top: 15px; right: 20px; z-index: 1000; display: flex; gap: 8px; }
        .btn-lang { background: white; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; }
        .btn-lang:hover { background: #f8fafc; border-color: var(--primary); }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar h1 { font-size: 22px; margin-bottom: 40px; border-left: 5px solid var(--primary); padding-left: 15px; letter-spacing: 1px; }
        .nav-item { padding: 14px 18px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 12px; color: #94a3b8; font-weight: 500; }
        .nav-item:hover { background: rgba(255,255,255,0.08); color: white; transform: translateX(5px); }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .nav-admin { border: 1px dashed #475569; margin-top: auto; color: #fbbf24; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        .page-content { display: none; max-width: 1000px; margin: 0 auto; }
        .page-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: var(--card-shadow); margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #64748b; }
        input, select { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--accent); color: white; min-width: 120px; }
        .btn-excel { background: #16a34a; color: white; }
        .table-wrapper { border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8fafc; padding: 16px; text-align: left; font-size: 13px; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        td { padding: 16px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        .status-badge { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; }
        .status-pending { background: #fff7ed; color: #c2410c; }
        .status-confirmed { background: #f0fdf4; color: #15803d; }
        .status-rejected { background: #fef2f2; color: #b91c1c; }
        .badge-type { background: #eef2ff; color: #4f46e5; padding: 4px 8px; border-radius: 6px; font-size: 12px; }
        .img-modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .img-modal img { max-width: 85%; max-height: 85%; border-radius: 12px; }
        .export-section { margin-top: 20px; padding: 20px; background: #f8fafc; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #e2e8f0; }
        .pagination-ctrl { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px; background: white; border-top: 1px solid #eee; }
        .btn-page { padding: 8px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; cursor: pointer; }
        .btn-page:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="btn-lang" onclick="changeLanguage('zh')">繁體中文</button>
        <button class="btn-lang" onclick="changeLanguage('vi')">Tiếng Việt</button>
    </div>

    <div id="imageLightbox" class="img-modal" onclick="closeLightbox()"><img id="lightboxImg" src=""></div>

    <div class="sidebar">
        <h1 data-vi="CÔNG TY ĐỈNH CHUYÊN">鼎顓電子股份有限公司</h1>
        <div id="nav-dashboard" class="nav-item active" onclick="switchPage('dashboard')" data-vi="📝 Đơn xin nghỉ phép">📝 請假申請</div>
        <div id="nav-personal" class="nav-item" onclick="switchPage('personal')" data-vi="🔍 Tra cứu cá nhân">🔍 個人紀錄查詢</div>
        <div id="nav-search" class="nav-item" onclick="switchPage('search')" data-vi="📅 Danh sách duyệt">📅 月度核准清單</div>
        <div id="nav-admin" class="nav-item nav-admin" onclick="checkAdminAccess()" data-vi="🛡️ Trung tâm quản lý">🛡️ 主管審核中心</div>
    </div>

    <div class="main-content">
        <div id="page-dashboard" class="page-content active">
            <h2 data-vi="📝 Đơn xin nghỉ phép">📝 請假申請</h2>
            <div class="card">
                <div class="form-grid">
                    <div><label data-vi="Bộ phận">所屬部門</label>
                        <select id="dept">
                            <option>管理部</option><option>製造部</option><option>SMT</option>
                            <option>資材部</option><option>業務部</option><option>DIP</option><option>品保部</option>
                        </select>
                    </div>
                    <div><label data-vi="Mã số nhân viên">人員工號</label><input type="text" id="empId" placeholder="例如: D220119"></div>
                </div>
                <div class="form-grid">
                    <div><label data-vi="Họ và tên">員工姓名</label><input type="text" id="empName"></div>
                    <div><label data-vi="Loại phép">請假類別</label>
                        <select id="leaveType">
                            <option>事假</option><option>病假</option><option>特休</option><option>公假</option>
                            <option>產假</option><option>陪產假</option><option>補休</option><option>婚假</option><option>生理假</option>
                        </select>
                    </div>
                </div>
                <div class="form-grid">
                    <div><label data-vi="Thời gian bắt đầu">起始時間</label><div style="display:flex; gap:10px;"><input type="date" id="startDate" onchange="autoCalc()"><input type="time" id="startTime" value="08:30" onchange="autoCalc()"></div></div>
                    <div><label data-vi="Thời gian kết thúc">結束時間</label><div style="display:flex; gap:10px;"><input type="date" id="endDate" onchange="autoCalc()"><input type="time" id="endTime" value="17:30" onchange="autoCalc()"></div></div>
                </div>
                <div id="durationText" data-vi="Vui lòng chọn thời gian để tính số giờ" style="color:var(--primary); font-weight:600; padding: 15px; background: #eff6ff; border-radius: 10px; margin: 20px 0; text-align: center; border: 1px dashed var(--primary);">請選擇時間以計算時數</div>
                <div><label data-vi="Lý do xin nghỉ">請假事由</label><input type="text" id="reason" placeholder="請輸入詳細原因"></div>
                <div style="margin-top:20px;"><label data-vi="Tải lên tài liệu chứng minh">證明文件上傳</label><input type="file" id="leaveImg" accept="image/*"></div>
                <button id="submitBtn" class="btn btn-primary" onclick="saveToCloud()" style="margin-top:30px; width: 100%;" data-vi="Xác nhận gửi đơn">確認送出申請</button>
            </div>
        </div>

        <div id="page-personal" class="page-content">
            <h2 data-vi="🔍 Tra cứu cá nhân">🔍 個人紀錄查詢</h2>
            <div class="card">
                <div class="search-container" style="display:flex; gap:15px; align-items:flex-end;">
                    <div style="flex:1">
                        <label data-vi="Nhập mã số nhân viên của bạn">請輸入您的工號</label>
                        <input type="text" id="queryEmpId" placeholder="例如: D220008" onkeypress="if(event.keyCode==13) searchPersonalRecords()">
                    </div>
                    <button class="btn btn-success" onclick="searchPersonalRecords()" data-vi="Bắt đầu tra cứu">開始查詢</button>
                </div>
            </div>
        </div>

        <div id="page-search" class="page-content">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 data-vi="📅 Danh sách duyệt tháng">📅 月度核准清單</h2>
                <button id="resetFilterBtn" onclick="resetFilter()" class="btn" style="background:#64748b; color:white; padding:8px 15px; display:none;">顯示全部 (Show All)</button>
            </div>
            <div class="card" style="padding:0; overflow:hidden;">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th data-vi="Bộ phận">部門</th><th data-vi="Mã số">工號</th><th data-vi="Họ tên">姓名</th>
                                <th data-vi="Loại phép">假別</th><th data-vi="Ngày">日期</th><th data-vi="Số giờ">時數</th><th data-vi="Trạng thái">狀態</th>
                            </tr>
                        </thead>
                        <tbody id="allTableBody"></tbody>
                    </table>
                </div>
                <div class="pagination-ctrl">
                    <button id="prevBtn" class="btn-page" onclick="changePage(-1)" data-vi="Trang trước">上一頁</button>
                    <span id="pageInfo" style="font-size:14px; color:#64748b;">第 1 頁 / 共 1 頁</span>
                    <button id="nextBtn" class="btn-page" onclick="changePage(1)" data-vi="Trang sau">下一頁</button>
                </div>
            </div>
            <div class="export-section">
                <div style="flex:1">
                    <label style="margin-bottom:5px">選擇月份導出 EXCEL</label>
                    <input type="month" id="exportMonth" style="width: 200px;">
                </div>
                <button class="btn btn-excel" onclick="exportMonthExcel()">📥 導出 EXCEL</button>
            </div>
        </div>

        <div id="page-admin" class="page-content">
            <h2 data-vi="🛡️ Trung tâm quản lý">🛡️ 主管審核中心</h2>
            <div class="card" style="padding:0; overflow:hidden;">
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>部門</th><th>姓名/假別</th><th>日期</th><th>時數</th><th>證明</th><th style="text-align: center;">動作</th></tr></thead>
                        <tbody id="adminTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAzRmuyxGJSip4k2VANAuUtuJLf25Ft9Pc",
        authDomain: "company-attendance-syste-e3503.firebaseapp.com",
        projectId: "company-attendance-syste-e3503",
        storageBucket: "company-attendance-syste-e3503.firebasestorage.app",
        messagingSenderId: "1092562606409",
        appId: "1:1092562606409:web:24843bace8a4e1e2616298",
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const gasUrl = "https://script.google.com/macros/s/AKfycbwvtShE86BfAZsSKNYnRaQ4mC1wy3CZZPvcwuJGIOq7bRWFX7HZHPWzRfMaX7ydvYsZfw/exec";

    let filteredRecords = [];
    let currentPage = 1;
    const rowsPerPage = 10;

    // --- 核心功能函數 ---
    window.switchPage = (id) => {
        document.querySelectorAll('.page-content, .nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        document.getElementById('nav-'+id).classList.add('active');
        if(id === 'admin') loadAdminData();
        if(id === 'search') loadAllData();
    };

    window.saveToCloud = async () => {
        const btn = document.getElementById('submitBtn'), dur = autoCalc();
        if(!dur) return alert("時間不正確");

        const id = document.getElementById('empId').value.trim();
        const name = document.getElementById('empName').value.trim();
        const dept = document.getElementById('dept').value;
        const leaveType = document.getElementById('leaveType').value;
        const sDate = document.getElementById('startDate').value;

        // 【防呆機制新增】
        // 正規表達式說明：開頭必須是 D, h, g, f (不分大小寫)，總長度需為 7 位
        const empIdRegex = /^[Dhgf].{6}$/i; 
        
        if(!id || !name) return alert("資料不完整");
        
        if(!empIdRegex.test(id)) {
            return alert("❌ 工號格式錯誤！\n\n規則：\n1. 必須以 D、h、g 或 f 開頭\n2. 總長度必須為 7 位數\n例如：D220119");
        }

        try {
            btn.disabled = true;
            const file = document.getElementById('leaveImg').files[0];
            let photo = "";
            if(file) {
                const reader = new FileReader();
                photo = await new Promise(r => { reader.onload=()=>r(reader.result); reader.readAsDataURL(file); });
            }
            await addDoc(collection(db, "formEntries"), { id, name, leaveType, dept, sDate, duration: dur, status: "審核中", photo, createdAt: new Date() });
            fetch(gasUrl, { method: "POST", mode: "no-cors", body: JSON.stringify({ id, name, dept, leaveType, sDate, duration: dur }) });
            alert("✅ 已送出申請!"); location.reload();
        } catch (e) { alert(e.message); } finally { btn.disabled = false; }
    };

    // --- 以下為分頁與輔助功能 (保持不變) ---
    window.loadAllData = async () => {
        const tbody = document.getElementById('allTableBody');
        const filterId = sessionStorage.getItem('targetFilterId');
        const resetBtn = document.getElementById('resetFilterBtn');
        tbody.innerHTML = "<tr><td colspan='7' style='text-align:center'>讀取中...</td></tr>";
        try {
            const snap = await getDocs(query(collection(db, "formEntries"), orderBy("createdAt", "desc")));
            filteredRecords = snap.docs.map(d => d.data());
            if(filterId) {
                filteredRecords = filteredRecords.filter(r => r.id === filterId);
                resetBtn.style.display = "inline-flex";
            } else { resetBtn.style.display = "none"; }
            currentPage = 1;
            renderTable();
        } catch (e) { tbody.innerHTML = "<tr><td colspan='7'>讀取失敗</td></tr>"; }
    };

    function renderTable() {
        const tbody = document.getElementById('allTableBody');
        const totalPages = Math.ceil(filteredRecords.length / rowsPerPage) || 1;
        const start = (currentPage - 1) * rowsPerPage;
        const pageData = filteredRecords.slice(start, start + rowsPerPage);
        tbody.innerHTML = pageData.map(r => {
            const cls = r.status === "批准" ? "status-confirmed" : (r.status === "退件" ? "status-rejected" : "status-pending");
            return `<tr><td>${r.dept}</td><td>${r.id}</td><td>${r.name}</td><td><span class="badge-type">${r.leaveType}</span></td><td>${r.sDate}</td><td>${r.duration}</td><td><span class="status-badge ${cls}">${r.status}</span></td></tr>`;
        }).join('') || "<tr><td colspan='7' style='text-align:center'>查無紀錄</td></tr>";
        document.getElementById('pageInfo').innerText = `第 ${currentPage} 頁 / 共 ${totalPages} 頁`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === totalPages);
    }

    window.changePage = (dir) => { currentPage += dir; renderTable(); };
    window.searchPersonalRecords = () => {
        const qId = document.getElementById('queryEmpId').value.trim();
        if(!qId) return alert("請輸入工號！");
        sessionStorage.setItem('targetFilterId', qId);
        switchPage('search');
    };
    window.resetFilter = () => { sessionStorage.removeItem('targetFilterId'); document.getElementById('queryEmpId').value = ""; loadAllData(); };
    window.autoCalc = () => {
        const d1 = document.getElementById('startDate').value, t1 = document.getElementById('startTime').value;
        const d2 = document.getElementById('endDate').value, t2 = document.getElementById('endTime').value;
        if(!d1 || !t1 || !d2 || !t2) return null;
        let start = new Date(`${d1} ${t1}`), end = new Date(`${d2} ${t2}`);
        if(isNaN(start) || isNaN(end) || end <= start) return null;
        let totalMins = 0, cur = new Date(start);
        while(cur < end) {
            const day = cur.getDay();
            if(day !== 0 && day !== 6) {
                const h = cur.getHours(), m = cur.getMinutes(), timeInMins = h * 60 + m;
                if(timeInMins >= 510 && timeInMins < 1050 && !(timeInMins >= 720 && timeInMins < 780)) totalMins++;
            }
            cur.setMinutes(cur.getMinutes() + 1);
        }
        const h = Math.floor(totalMins/60), m = totalMins%60;
        document.getElementById('durationText').innerText = `🕒 計算結果：${h} 小時 ${m} 分鐘`;
        return `${h}時${m}分`;
    };
    window.exportMonthExcel = async () => {
        const month = document.getElementById('exportMonth').value;
        if (!month) return alert("請選擇月份！");
        try {
            const snap = await getDocs(collection(db, "formEntries"));
            const data = snap.docs.map(d => d.data()).filter(r => r.sDate && r.sDate.startsWith(month));
            if (data.length === 0) return alert("無資料");
            const wsData = [["部門", "工號", "姓名", "假別", "日期", "時數", "狀態"]];
            data.forEach(r => wsData.push([r.dept, r.id, r.name, r.leaveType, r.sDate, r.duration, r.status]));
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, `Attendence_${month}.xlsx`);
        } catch (e) { alert(e.message); }
    };
    window.changeLanguage = (lang) => {
        document.querySelectorAll('[data-vi]').forEach(el => {
            if (!el.dataset.zh) el.dataset.zh = el.innerText;
            el.innerText = (lang === 'vi') ? el.dataset.vi : el.dataset.zh;
        });
    };
    window.loadAdminData = async () => {
        const snap = await getDocs(query(collection(db, "formEntries"), where("status", "==", "審核中")));
        document.getElementById('adminTableBody').innerHTML = snap.docs.map(d => {
            const r = d.data();
            return `<tr><td>${r.dept}</td><td><b>${r.name}</b><br>${r.leaveType}</td><td>${r.sDate}</td><td>${r.duration}</td><td>${r.photo ? `<img src="${r.photo}" style="width:35px" onclick="openLightbox('${r.photo}')">` : '-'}</td><td><button class="btn-approve" onclick="updateStatus('${d.id}','批准')">批准</button></td></tr>`;
        }).join('') || "<tr><td colspan='6' style='text-align:center'>無待審核案件</td></tr>";
    };
    window.updateStatus = async (id, status) => { await updateDoc(doc(db, "formEntries", id), { status }); loadAdminData(); };
    window.checkAdminAccess = () => { if(prompt("Password:") === "admin") switchPage('admin'); };
    window.openLightbox = (src) => { document.getElementById('lightboxImg').src = src; document.getElementById('imageLightbox').style.display = 'flex'; };
    window.closeLightbox = () => { document.getElementById('imageLightbox').style.display = 'none'; };
    window.addEventListener('DOMContentLoaded', () => { switchPage('dashboard'); });
</script>
</body>
</html>
